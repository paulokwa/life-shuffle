[build]
  # Pinned to the Flutter version used for local development (see `flutter --version`)
  # so production builds can't silently drift to a newer "stable" release mid-session.
  command = "rm -rf flutter && git clone https://github.com/flutter/flutter.git -b 3.41.9 --depth 1 && ./flutter/bin/flutter build web --release --dart-define=FIREBASE_WEB_API_KEY=$FIREBASE_WEB_API_KEY"
  publish = "build/web"

[functions]
  directory = "netlify/functions"
